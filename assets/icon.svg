<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <rect width="128" height="128" rx="24" fill="#1e293b"/>
  <g transform="translate(64,38)">
    <!-- Microphone body -->
    <rect x="-12" y="-18" width="24" height="36" rx="12" fill="#3b82f6"/>
    <!-- Microphone arc -->
    <path d="M-20,10 a20,20 0 0,0 40,0" stroke="#60a5fa" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Microphone stand -->
    <line x1="0" y1="30" x2="0" y2="42" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"/>
    <line x1="-12" y1="42" x2="12" y2="42" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Sound waves -->
  <g transform="translate(64,38)" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6">
    <path d="M22,-12 C28,-6 28,6 22,12"/>
    <path d="M28,-20 C38,-10 38,10 28,20"/>
    <path d="M-22,-12 C-28,-6 -28,6 -22,12"/>
    <path d="M-28,-20 C-38,-10 -38,10 -28,20"/>
  </g>
  <!-- Text lines (transcription) -->
  <g transform="translate(28,90)" fill="#94a3b8">
    <rect width="72" height="4" rx="2"/>
    <rect y="10" width="56" height="4" rx="2"/>
    <rect y="20" width="64" height="4" rx="2"/>
  </g>
</svg>
